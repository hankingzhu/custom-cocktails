<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#080503"/>
  <!-- Outer diamond frame -->
  <polygon points="50,4 96,50 50,96 4,50" fill="none" stroke="#c4863a" stroke-width="1.4"/>
  <!-- Inner diamond hairline -->
  <polygon points="50,14 86,50 50,86 14,50" fill="none" stroke="#c4863a" stroke-width="0.5" opacity="0.35"/>
  <!-- Martini bowl -->
  <path d="M32,34 L68,34 L50,62 Z" fill="none" stroke="#c4863a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Stem -->
  <line x1="50" y1="62" x2="50" y2="74" stroke="#c4863a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="40" y1="74" x2="60" y2="74" stroke="#c4863a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
